x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: 100M

services:
  postgres:
    image: postgres:16.2
    environment:
      POSTGRES_DB: lms
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    mem_limit: 512m
    cpus: "1.0"
    <<: *default-logging
    restart: unless-stopped

  piston:
    image: ghcr.io/engineer-man/piston
    container_name: piston_api
    restart: unless-stopped
    privileged: true
    # In production, use only `expose: ["2000"]` and run the app in the same Docker network.
    # For local dev (Next.js on host), we bind to localhost only:
    ports:
      - "127.0.0.1:2000:2000"
    volumes:
      - piston_packages:/piston/packages
    tmpfs:
      - /tmp:exec
    mem_limit: 2g
    cpus: "1.0"
    <<: *default-logging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    mem_limit: 256m
    cpus: "0.5"
    <<: *default-logging

volumes:
  postgres_data:
  piston_packages:
  redis_data:
